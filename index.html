<style>
  * { box-sizing: border-box; }

  /* Warm cream base — override token so every screen picks it up */
  :root { --cream-100: #FDF6E2; }

  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-body);
    color: var(--text-body);
    background:
      radial-gradient(120% 60% at 20% 0%, #FCE8EC 0%, transparent 50%),
      radial-gradient(120% 60% at 90% 100%, #E8F4FF 0%, transparent 55%),
      var(--cream-100);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Outer stage ─────────────────────────────────────────── */
  #stage {
    height: 100dvh;
    display: grid;
    place-items: center;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  /* Scattered stickers behind the phone on tablet/desktop */
  .stage-decor { position: fixed; inset: 0; pointer-events: none; z-index: 0; display: none; }
  @media (min-width: 768px) { .stage-decor { display: block; } }
  .stage-decor span {
    position: absolute; font-size: 56px; opacity: .5;
    filter: drop-shadow(0 8px 0 rgba(58,35,20,.10));
  }

  /* ── Phone frame (tablet & mobile only) ──────────────────── */
  #phone {
    position: relative;
    width: 390px;
    height: 844px;
    transform-origin: center center;
    will-change: transform;
    background: var(--choco-900);
    border-radius: 54px;
    padding: 12px;
    box-shadow:
      0 2px 0 4px var(--choco-700),
      0 40px 80px -20px rgba(58,35,20,.5),
      inset 0 0 0 2px #000;
    z-index: 1;
  }
  /* notch */
  #phone::after {
    content: ''; position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 130px; height: 26px; background: var(--choco-900); border-radius: 0 0 16px 16px; z-index: 20;
  }

  #screen-clip {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 44px;
    overflow: hidden;
    background: var(--cream-100);
  }

  #app {
    position: absolute; inset: 0;
    overflow-y: auto; overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
  }
  #app::-webkit-scrollbar { width: 0; }

  /* ── DESKTOP (≥ 1024px): full-viewport, no phone shell ───── */
  @media (min-width: 1024px) {
    body { overflow: hidden; }
    .stage-decor { display: none; }
    #stage {
      padding: 0;
      height: 100dvh;
      place-items: stretch;
    }
    #phone {
      width: 100% !important;
      height: 100% !important;
      border-radius: 0 !important;
      padding: 0 !important;
      box-shadow: none !important;
      background: transparent !important;
      transform: none !important;
    }
    #phone::after { display: none !important; }
    #screen-clip {
      border-radius: 0 !important;
      background: var(--cream-100);
    }
    #app {
      position: absolute; inset: 0;
      overflow: hidden;
    }
  }

  /* ── MOBILE (< 768px): full-bleed, no frame ──────────────── */
  @media (max-width: 767px) {
    body { overflow: auto; }
    #stage { padding: 0; height: 100%; place-items: stretch; overflow: visible; }
    #phone {
      width: 100% !important;
      height: 100% !important;
      min-height: 100dvh !important;
      transform: none !important;
      border-radius: 0 !important;
      padding: 0 !important;
      box-shadow: none !important;
    }
    #phone::after { display: none !important; }
    #screen-clip { border-radius: 0 !important; }
  }

  /* ── Tablet (768–1023px): centered phone, scaled to fit ──── */
  @media (min-width: 768px) and (max-width: 1023px) {
    /* fit scaler JS handles this range */
  }

  /* ── Animations ──────────────────────────────────────────── */
  .springy-cta { animation: cta-pulse 2.4s var(--ease-in-out) infinite; }
  @keyframes cta-pulse {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-2px) scale(1.015); }
  }

  @keyframes pipe-squeeze {
    0%, 100% { transform: rotate(0deg) scale(1); }
    45% { transform: rotate(-3deg) scale(1.04, .97); }
    60% { transform: rotate(-3deg) scale(.98, 1.03); }
  }
  @keyframes dollop-drop {
    0%, 40% { transform: translateY(0) scale(.5); opacity: 0; }
    55% { opacity: 1; }
    75% { transform: translateY(34px) scale(1); opacity: 1; }
    100% { transform: translateY(60px) scale(.8); opacity: 0; }
  }

  /* Transform-only so it never traps invisible in a paused iframe */
  @keyframes topping-land {
    0%   { transform: translate(-50%,-50%) translateY(-40px) scale(1.3) rotate(-8deg); }
    60%  { transform: translate(-50%,-50%) translateY(3px) scale(.94) rotate(2deg); }
    80%  { transform: translate(-50%,-50%) translateY(-2px) scale(1.03) rotate(-1deg); }
    100% { transform: translate(-50%,-50%) translateY(0) scale(1) rotate(0deg); }
  }

  /* Screen transition: animate transform only, not opacity */
  .screen-anim {
    animation: screen-in var(--dur-slow) var(--ease-out);
    display: flex; flex-direction: column; min-height: 100%;
  }
  .screen-anim > * { flex: 1 0 auto; }
  .screen-anim[data-dir="back"] { animation: screen-in-back var(--dur-slow) var(--ease-out); }
  @keyframes screen-in {
    from { transform: translateX(22px); }
    to { transform: translateX(0); }
  }
  @keyframes screen-in-back {
    from { transform: translateX(-22px); }
    to { transform: translateX(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .springy-cta, .screen-anim { animation: none !important; }
  }

  /* Desktop: screen-anim fills the full viewport height */
  @media (min-width: 1024px) {
    .screen-anim {
      min-height: 100dvh;
      height: 100dvh;
    }
  }

  em { font-style: italic; }
</style>

  <!-- Fit scaler: applies only on tablet (768–1023px); desktop/mobile skip it -->
  <script>
    (function () {
      var PHONE_W = 390, PHONE_H = 844, PAD = 24;
      var phone = document.getElementById('phone');
      function fit() {
        if (!phone) return;
        var w = window.innerWidth;
        // Desktop (≥1024px): CSS already makes phone 100% — clear any scale
        if (w >= 1024) { phone.style.transform = ''; return; }
        // Mobile (<768px): CSS already makes phone full-bleed — clear any scale
        if (w < 768) { phone.style.transform = ''; return; }
        // Tablet (768–1023px): scale the phone mockup to fit the viewport
        var s = Math.min(
          (window.innerWidth - PAD) / PHONE_W,
          (window.innerHeight - PAD) / PHONE_H,
          1
        );
        phone.style.transform = 'scale(' + s + ')';
      }
      window.addEventListener('resize', fit);
      window.addEventListener('orientationchange', fit);
      fit();
    })();
  </script>
